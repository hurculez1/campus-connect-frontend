<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1614" />
  <meta name="description" content="Campus Connect Uganda — Uganda's #1 dating platform for university students." />
  <meta property="og:title" content="Campus Connect Uganda — Connecting Hearts on Campus" />
  <meta property="og:type" content="website" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="%PUBLIC_URL%/logo.png" />
  <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo.png" />

  <title>Campus Connect Uganda — Connecting Hearts on Campus</title>

  <style>
    body {
      background-color: #0f0d0c;
      color: #f0ede8;
      margin: 0;
      font-family: 'Plus Jakarta Sans', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #root {
      min-height: 100vh;
    }

    #crash-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #0f0d0c;
      color: #fca5a5;
      padding: 40px;
      font-family: monospace;
      overflow: auto;
    }

    #crash-overlay.show {
      display: block;
    }
  </style>
  <script>
    window.__errors = [];
    window.onerror = function (msg, src, line, col, err) {
      var el = document.getElementById('crash-overlay');
      if (el) {
        el.classList.add('show');
        el.innerHTML = '<h2 style="color:#f43f5e;margin-bottom:16px">💔 JS Crash Detected</h2><pre style="white-space:pre-wrap;font-size:13px">' +
          'Message: ' + msg + '\nSource: ' + src + ':' + line + ':' + col +
          (err ? '\nStack: ' + err.stack : '') + '</pre>';
      }
    };
    window.addEventListener('unhandledrejection', function (e) {
      var el = document.getElementById('crash-overlay');
      if (el) {
        el.classList.add('show');
        el.innerHTML = '<h2 style="color:#f43f5e;margin-bottom:16px">💔 Unhandled Promise Rejection</h2><pre style="white-space:pre-wrap;font-size:13px">' +
          String(e.reason) + (e.reason && e.reason.stack ? '\n' + e.reason.stack : '') + '</pre>';
      }
    });
  </script>
</head>

<body>
  <div id="crash-overlay"></div>
  <noscript>You need to enable JavaScript to run Campus Connect Uganda.</noscript>
  <div id="root"></div>
</body>

</html>
